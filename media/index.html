<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src __CSP_SOURCE__ https: data:; font-src __CSP_SOURCE__ data:; connect-src __CSP_SOURCE__; style-src __CSP_SOURCE__ 'unsafe-inline'; script-src 'nonce-__NONCE__' __CSP_SOURCE__; worker-src blob: __CSP_SOURCE__;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Choir Control Center</title>
    <link rel="stylesheet" href="__STYLE_URI__" />
    <style>
      /* Selected rule badge shown when a rule is focused from the Rules tree */
      .selected-badge{min-width:200px;padding:6px 10px;border-radius:8px;background:rgba(255,255,255,.9);border:1px solid rgba(36,47,41,.2);color:#5e665f;font-size:13px;display:inline-block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      .rule-hint{margin:10px 0 0;color:#5e665f;font-size:13px}
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <div class="eyebrow">Choir Product UX</div>
          <h1>Control Center</h1>
        </div>
        <div class="topbar-actions">
          <div id="selectedRuleBadge" class="selected-badge" aria-hidden="true"></div>
          <button id="refreshBtn" type="button">Refresh</button>
        </div>
      </header>

      <section class="toolbar">
        <div class="field role-field">
          <label for="roleSelect">Role</label>
          <select id="roleSelect">
            <option value="conductor" selected>conductor</option>
            <option value="architect">architect</option>
            <option value="analyst">analyst</option>
            <option value="enforcer">enforcer</option>
          </select>
        </div>
        <div class="field dsl-field">
          <label for="dslInput">Explicit DSL Action</label>
          <div class="dsl-row">
            <input id="dslInput" type="text" placeholder="choir plan" />
            <button id="runDslBtn" type="button">Run</button>
          </div>
        </div>
      </section>

      <div id="ruleHint" class="rule-hint">Tip: To edit rules, open the Rules view in the Choir activity bar; selecting a rule opens the Control Center and reveals it in the editor for persistent edits.</div>

      <nav id="surfaceTabs" class="surface-tabs" aria-label="UI Surfaces"></nav>

      <main id="surfaceContainer" class="surface-container"></main>

      <section class="console">
        <div class="console-header">Action Log</div>
        <pre id="consoleOutput"></pre>
      </div>
    </div>
    <script nonce="__NONCE__">
        const vscode = acquireVsCodeApi();
        window.vscode = vscode;
        // Update selected-rule badge when the extension sends a snapshot containing highlightRuleId
        window.addEventListener('message', (ev) => {
          try {
            const a = ev.data;
            const sb = document.getElementById('selectedRuleBadge');
            const snapshot = a && a.type === 'snapshot' ? a.payload : (a && a.type === 'action-result' && a.payload && a.payload.snapshot ? a.payload.snapshot : null);
            if (!sb) return;
            if (snapshot && snapshot.highlightRuleId) {
              sb.textContent = `Selected rule: ${snapshot.highlightRuleId}`;
            } else {
              sb.textContent = '';
            }
          } catch (err) {
            // ignore
          }
        });
    </script>
    <script type="module" nonce="__NONCE__" src="__SCRIPT_URI__"></script>
  </body>
</html>

version: "1.0.0"
mission: "Deliver a secure baseline policy set"
vision: "Policy intent is explicit and enforceable in daily development"
non-goals:
  - "Do not model every architecture decision as a DSL rule"
intent:
  goals:
    - baseline security
  constraints: []
policy:
  rules:
    - id: explicit-no-fs-import
      description: Disallow fs imports
      priority: 10
      match:
        imports:
          - fs
      constraint:
        type: forbid
      message: Do not import fs directly
      severity: error

version: "1.0.0"
mission: "Keep module boundaries clean and auditable"
vision: "Large repos retain clear architectural contracts"
intent:
  goals:
    - secure services
  constraints:
    - no direct db access
  nonGoals:
    - "Do not enforce naming conventions unrelated to architecture intent"
policy:
  rules:
    - id: explicit-no-console
      description: Disallow console logging
      priority: 1
      match:
        callExpressions:
          - console.log
      constraint:
        type: forbid
      message: Console logging is forbidden
      severity: warning

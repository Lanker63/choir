version: "1.0.0"
mission: "Preserve dependency layering across the codebase"
vision: "Dependency drift is detected early and corrected quickly"
non-goals:
  - "Do not replace dependency visualization tooling"
intent:
  goals:
    - maintain layering
  constraints: []
policy:
  rules:
    - id: explicit-no-fs-import
      description: Disallow fs imports
      priority: 10
      match:
        imports:
          - fs
      constraint:
        type: forbid
      message: Do not import fs directly
      severity: error

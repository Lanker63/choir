version: "1.0.0"
mission: "Continuously surface and prevent architecture violations"
vision: "Violations become visible before code review"
intent:
  goals:
    - security hardening
  constraints:
    - no eval
    - no direct db access
  non-goals:
    - "Do not fully automate remediation of all violations"
policy:
  rules:
    - id: explicit-no-fs-import
      description: Disallow fs imports
      priority: 5
      match:
        imports:
          - fs
      constraint:
        type: forbid
      message: Do not import fs directly
      severity: error

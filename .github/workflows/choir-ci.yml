name: Choir CI

on:
  push:
  pull_request:

jobs:
  choir:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension and CLI
        run: npm run build:extension

      - name: Link choir CLI
        run: npm link

      - name: Run Choir CI pipeline
        run: choir ci run

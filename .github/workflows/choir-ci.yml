name: Choir CI

on:
  push:
  pull_request:

jobs:
  choir:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension and CLI
        run: npm run build:extension

      - name: Run verification harness
        run: npm run verify

      - name: Run deterministic verification
        run: npm run verify:determinism

      - name: Run transaction verification
        run: npm run verify:transactions

      - name: Run state verification
        run: npm run verify:state

      - name: Run policy verification
        run: npm run verify:policy

      - name: Run orchestration verification
        run: npm run verify:orchestration

      - name: Run production verification
        run: npm run verify:production

      - name: Run compiler verification
        run: npm run verify:compiler

      - name: Run planning verification
        run: npm run verify:planning

      - name: Run preview verification
        run: npm run verify:preview

      - name: Run contract verification checklist
        run: npm run verify:contracts

      - name: Property-based tests
        run: npm run verify:property

      - name: Chaos tests
        run: npm run verify:chaos

      - name: Run architecture suite
        run: npm run test:architecture

      - name: Run final full-system hardening gate
        run: npm run verify:full

      - name: Run Choir CI pipeline
        run: |
          cd test-fixtures/simple-project
          node ../../out/cli.js ci run

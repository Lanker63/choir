name: Choir CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 3 * * *"

jobs:
  choir:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension and CLI
        run: npm run build:extension

      - name: Run verification harness
        run: npm run verify

      - name: Run deterministic verification
        run: npm run verify:determinism

      - name: Run transaction verification
        run: npm run verify:transactions

      - name: Run state verification
        run: npm run verify:state

      - name: Run contract verification checklist
        run: npm run verify:contracts

      - name: Property-based tests
        run: npm run verify:property

      - name: Chaos tests
        run: npm run verify:chaos

      - name: Run architecture suite
        run: npm run test:architecture

      - name: Link choir CLI
        run: npm link

      - name: Run Choir CI pipeline
        run: choir ci run

  choir-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension and CLI
        run: npm run build:extension

      - name: Verification harness (full)
        run: npm run verify

      - name: Deterministic verification
        run: npm run verify:determinism

      - name: Transaction verification
        run: npm run verify:transactions

      - name: State verification
        run: npm run verify:state

      - name: Contract verification checklist (full)
        run: npm run verify:contracts:full

      - name: Property-based tests (full)
        run: npm run verify:property:full

      - name: Chaos tests (full extreme)
        run: npm run verify:chaos:full

      - name: Run architecture suite
        run: npm run test:architecture
